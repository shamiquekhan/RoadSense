name: Check README metrics

on:
  push:
    paths:
      - 'outputs/network_kpis.csv'
      - 'README.md'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'outputs/network_kpis.csv'
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run README vs CSV check
        run: |
          python3 scripts/ci_check_readme_vs_csv.py
